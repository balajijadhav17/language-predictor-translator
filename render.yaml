services:
  - type: web
    name: language-prediction-translation
    runtime: python
    pythonVersion: "3.13.1"        # ← add this line
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput
    startCommand: gunicorn LanguagePredictionTranslation.wsgi:application
    envVars:
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "*"