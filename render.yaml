services:
  - type: web
    name: language-prediction-translation
    runtime: python
    pythonVersion: "3.13.1"
    buildCommand: chmod +x build.sh && ./build.sh
    startCommand: gunicorn LanguagePredictionTranslation.wsgi:application
    envVars:
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "*"